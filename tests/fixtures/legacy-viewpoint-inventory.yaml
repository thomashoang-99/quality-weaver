        expected_result: Every transition matches the documented valid-transition table, ending at the documented terminal status
      - source_row_id: rules/viewpoints/13-e2e-journey.md::Abnormal case::Interruption mid-journey
        path: rules/viewpoints/13-e2e-journey.md
        heading: Abnormal case
        aspect: Interruption mid-journey
        viewpoint: Check closing the app/tab or losing network mid-journey, then resuming
        expected_result: The user can resume/redo safely; no duplicate transaction, no stuck state
      - source_row_id: rules/viewpoints/13-e2e-journey.md::Abnormal case::External system failure
        path: rules/viewpoints/13-e2e-journey.md
