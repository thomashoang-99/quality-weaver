        expected_result: The empty state is displayed correctly per design (icon/text clearly describing the state), not an error or broken layout
      - source_row_id: rules/viewpoints/01-ui.md::Layout::ZoomIn / ZoomOut
        path: rules/viewpoints/01-ui.md
        heading: Layout
