        path: rules/viewpoints/01-ui.md
        heading: Initial Display
        aspect: Access route parameters
        viewpoint: Check accessing the screen with valid route/query parameters (id, session_id, code, ...)
        expected_result: The correct data is fetched and rendered based on those parameters
      - source_row_id: rules/viewpoints/01-ui.md::Initial Display::Default field/tab value
        path: rules/viewpoints/01-ui.md
        heading: Initial Display
        aspect: Default field/tab value
        viewpoint: Check the default value of a field/toggle/dropdown/tab when the screen first opens
        expected_result: The default matches the spec (e.g. today + N days, a specific option, the default tab pre-loaded)
