        expected_result: Only 1 transaction is created; no duplicate record/side-effect
      - source_row_id: rules/viewpoints/12-it-flow.md::Edge case::Permission changes mid-flow
        path: rules/viewpoints/12-it-flow.md
        heading: Edge case
        aspect: Permission changes mid-flow
        viewpoint: Check the user's role/permission being revoked partway through the flow
        expected_result: The flow blocks/redirects appropriately at the next screen that requires that permission
