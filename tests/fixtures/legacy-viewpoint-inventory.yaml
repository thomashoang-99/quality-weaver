        expected_result: The UI is compatible and has no display errors or broken layout on different devices
      - source_row_id: rules/viewpoints/01-ui.md::Initial Display::Loading Spinner / Skeleton Loader
        path: rules/viewpoints/01-ui.md
        heading: Initial Display
        aspect: Loading Spinner / Skeleton Loader
        viewpoint: Check whether a spinner/skeleton is displayed while data is loading; interactive controls during that window
        expected_result: The loader is displayed in the correct position and disappears once data has finished loading; controls stay disabled until the request resolves
