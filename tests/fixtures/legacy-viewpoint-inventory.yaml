        path: rules/viewpoints/13-e2e-journey.md
        heading: Edge case
        aspect: Alternate business branch
        viewpoint: Check a valid but less common business branch (e.g. cancel then reapply, partial refund)
        expected_result: The alternate branch completes correctly and doesn't corrupt data from the main branch
      - source_row_id: rules/viewpoints/13-e2e-journey.md::Edge case::Multi-actor interaction
        path: rules/viewpoints/13-e2e-journey.md
        heading: Edge case
        aspect: Multi-actor interaction
        viewpoint: Check a journey requiring 2+ roles interacting (e.g. employer approves, worker confirms)
        expected_result: Each actor's action is reflected correctly and promptly for the other actor
      - source_row_id: rules/viewpoints/13-e2e-journey.md::Edge case::Time-based condition
        path: rules/viewpoints/13-e2e-journey.md
        heading: Edge case
