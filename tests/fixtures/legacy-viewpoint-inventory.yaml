        path: rules/viewpoints/13-e2e-journey.md
        heading: Happy case
        aspect: Full main business journey
        viewpoint: Check the entire journey including every mandatory business branch (e.g. apply → work → get paid)
        expected_result: Every feature hands off correctly; the final state (balance, history, status) matches the business rule end-to-end
      - source_row_id: rules/viewpoints/13-e2e-journey.md::Happy case::Notification / external side-effect
        path: rules/viewpoints/13-e2e-journey.md
        heading: Happy case
        aspect: Notification / external side-effect
        viewpoint: Check emails/SMS/push notifications triggered at each journey milestone
        expected_result: Each notification fires at the correct milestone, with correct content/recipient
      - source_row_id: rules/viewpoints/13-e2e-journey.md::Happy case::Multi-session continuity
        path: rules/viewpoints/13-e2e-journey.md
        heading: Happy case
        aspect: Multi-session continuity
        viewpoint: Check resuming the journey in a new session (logout/login, new device)
        expected_result: Progress/state is preserved correctly, matching what was left off
