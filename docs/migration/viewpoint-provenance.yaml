      aspect: Data carried from previous screen
      viewpoint: Check data passed in from the previous screen or step (search criteria, selection, filter, id)
      expected_result: The destination screen receives and correctly pre-fills/restores that exact data, not a
        blank/reset state
    migrated_id: VP-DATA-CONTINUITY-001
