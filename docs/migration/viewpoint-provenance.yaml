version: 1.0.0
identity_format: '{source.path}::{source.heading}::{source.aspect}'
rows:
  - source_row_id: rules/viewpoints/01-ui.md::Layout::Compare UI with Design
    source:
      path: rules/viewpoints/01-ui.md
      heading: Layout
      aspect: Compare UI with Design
      viewpoint: Check whether the displayed UI matches the design (Figma, Design Spec, etc.)
      expected_result: The UI is displayed correctly according to the design
    migrated_id: VP-UI-LAYOUT-001
  - source_row_id: rules/viewpoints/01-ui.md::Layout::Empty / first-time state
    source:
      path: rules/viewpoints/01-ui.md
      heading: Layout
      aspect: Empty / first-time state
      viewpoint: Check the display when there is no data (no prior data, first visit, no search yet)
      expected_result: The empty state is displayed correctly per design (icon/text clearly describing the state), not
        an error or broken layout
    migrated_id: VP-UI-LAYOUT-002
  - source_row_id: rules/viewpoints/01-ui.md::Layout::ZoomIn / ZoomOut
    source:
      path: rules/viewpoints/01-ui.md
      heading: Layout
      aspect: ZoomIn / ZoomOut
      viewpoint: Check the ability to zoom in / zoom out the UI
      expected_result: The UI does not break and the layout remains reasonable when zooming
    migrated_id: VP-UI-LAYOUT-003
  - source_row_id: rules/viewpoints/01-ui.md::Layout::Responsive (mobile/desktop)
    source:
      path: rules/viewpoints/01-ui.md
      heading: Layout
      aspect: Responsive (mobile/desktop)
      viewpoint: Check that the UI displays well on multiple devices (mobile/desktop)
      expected_result: The UI is compatible and has no display errors or broken layout on different devices
    migrated_id: VP-UI-LAYOUT-004
  - source_row_id: rules/viewpoints/01-ui.md::Initial Display::Loading Spinner / Skeleton Loader
    source:
      path: rules/viewpoints/01-ui.md
      heading: Initial Display
      aspect: Loading Spinner / Skeleton Loader
      viewpoint: Check whether a spinner/skeleton is displayed while data is loading; interactive controls during that
        window
      expected_result: The loader is displayed in the correct position and disappears once data has finished loading;
        controls stay disabled until the request resolves
    migrated_id: VP-UI-LAYOUT-005
  - source_row_id: rules/viewpoints/01-ui.md::Initial Display::Initial display / screen load
    source:
      path: rules/viewpoints/01-ui.md
      heading: Initial Display
      aspect: Initial display / screen load
      viewpoint: Check the screen/route loads successfully with the expected URL and every expected component
        initialized and populated
      expected_result: The screen renders without error, matching the design's initial content and format
    migrated_id: VP-UI-LAYOUT-006
  - source_row_id: rules/viewpoints/01-ui.md::Initial Display::Access route parameters
    source:
      path: rules/viewpoints/01-ui.md
      heading: Initial Display
      aspect: Access route parameters
      viewpoint: Check accessing the screen with valid route/query parameters (id, session_id, code, ...)
      expected_result: The correct data is fetched and rendered based on those parameters
    migrated_id: VP-UI-LAYOUT-007
  - source_row_id: rules/viewpoints/01-ui.md::Initial Display::Default field/tab value
    source:
      path: rules/viewpoints/01-ui.md
      heading: Initial Display
      aspect: Default field/tab value
      viewpoint: Check the default value of a field/toggle/dropdown/tab when the screen first opens
      expected_result: The default matches the spec (e.g. today + N days, a specific option, the default tab pre-loaded)
    migrated_id: VP-UI-LAYOUT-008
  - source_row_id: rules/viewpoints/01-ui.md::Initial Display::Data carried from previous screen
    source:
